<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 다크 배경 원형 -->
  <rect width="32" height="32" rx="8" fill="#030712"/>

  <!-- 상승 막대 차트: 데이터 인사이트 표현 -->
  <!-- 왼쪽 막대 (낮음) -->
  <rect x="5" y="20" width="5" height="8" rx="1.5" fill="#2563EB" opacity="0.5"/>
  <!-- 가운데 막대 (중간) -->
  <rect x="13" y="14" width="5" height="14" rx="1.5" fill="#2563EB" opacity="0.75"/>
  <!-- 오른쪽 막대 (높음) -->
  <rect x="21" y="7" width="5" height="21" rx="1.5" fill="#2563EB"/>

  <!-- 상단 추세 점 (인사이트 포인트) -->
  <circle cx="23.5" cy="5.5" r="2" fill="#60A5FA"/>
</svg>
